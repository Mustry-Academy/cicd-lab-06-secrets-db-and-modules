# Release to the production gateway on tag push (GitHub Flow release).
#
# Same routing you learned in Lab 04: a push to `main` deploys to TEST, a
# `vX.Y.Z` tag on `main` ships to PRODUCTION. The tag pins the exact commit
# production runs — a named, re-deployable version.
#
# One difference from Lab 04: there, release.yml was a full copy of the deploy
# job. Here it is a THIN CALLER — it fires on the tag and runs deploy.yml
# (workflow_call) with `target: production`. That matters in this lab because
# Parts 1C and 2B have you ADD steps to deploy.yml (materialize secret files,
# migrate the database): with one pipeline, your steps ship to test and
# production alike, instead of having to be pasted into two workflows.
#
# No validation on the tag: you tag a commit that is already on main, and it
# passed ci.yml on the PR that merged it — the tag just picks which validated
# commit ships to production.
#
# Rollback: Actions → Deploy → Run workflow → pick the released tag under
# "Use workflow from" → target: production.

name: Release

on:
  push:
    tags: ['v*']

# No concurrency group here: deploy.yml (the called workflow) already
# serializes on deploy-lab-gateway-production. Declaring the same group in
# the caller deadlocks — the caller holds the group while waiting for the
# callee to enter it, and GitHub cancels the run.

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/deploy.yml
    with:
      target: production
    secrets: inherit
